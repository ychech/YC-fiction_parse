apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: novel-parser-ingress
  namespace: novel-parser
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.novel-parser.example.com
    secretName: novel-parser-tls
  rules:
  - host: api.novel-parser.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 80
