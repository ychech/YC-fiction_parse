version: '3.8'

services:
  # API 服务
  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DEBUG=false
      - DB_POSTGRES_HOST=postgres
      - DB_POSTGRES_DB=novel_parser
      - DB_POSTGRES_USER=novel_parser
      - DB_POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_MONGODB_URL=mongodb://mongo:27017/novel_parser
      - DB_REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AI_OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_OPENAI_MODEL=gpt-3.5-turbo
    depends_on:
      - postgres
      - mongo
      - redis
    volumes:
      - uploads:/app/storage
    networks:
      - novel-parser-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: celery -A src.service_layer.celery_app worker -l info -Q parsing,analysis,default -c 4
    environment:
      - ENV=production
      - DB_POSTGRES_HOST=postgres
      - DB_POSTGRES_DB=novel_parser
      - DB_POSTGRES_USER=novel_parser
      - DB_POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_MONGODB_URL=mongodb://mongo:27017/novel_parser
      - DB_REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AI_OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
      - mongo
      - redis
    volumes:
      - uploads:/app/storage
    networks:
      - novel-parser-network
    restart: unless-stopped
    deploy:
      replicas: 2

  # Celery Beat (定时任务)
  beat:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: celery -A src.service_layer.celery_app beat -l info
    environment:
      - ENV=production
      - DB_POSTGRES_HOST=postgres
      - DB_POSTGRES_DB=novel_parser
      - DB_POSTGRES_USER=novel_parser
      - DB_POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    networks:
      - novel-parser-network
    restart: unless-stopped

  # Flower (Celery 监控)
  flower:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: celery -A src.service_layer.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    networks:
      - novel-parser-network
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=novel_parser
      - POSTGRES_USER=novel_parser
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - novel-parser-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    environment:
      - MONGO_INITDB_DATABASE=novel_parser
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - novel-parser-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - novel-parser-network
    restart: unless-stopped

  # MinIO (对象存储)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - novel-parser-network
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
  uploads:

networks:
  novel-parser-network:
    driver: bridge
